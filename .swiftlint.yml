included:
  - PrismTUN
  - PrismTUNTests
  - PacketTunnelProvider

excluded:
  - PrismTUN/Resources
  - .build

disabled_rules:
  - todo
  - file_header
  - trailing_whitespace

opt_in_rules:
  - empty_collection_literal
  - empty_string
  - first_where
  - last_where
  - toggle_bool
  - yoda_condition

line_length:
  warning: 140
  error: 200
  ignores_comments: true
  ignores_urls: true

function_body_length:
  warning: 80
  error: 150

file_length:
  warning: 500
  error: 800
  ignore_comment_only_lines: true

type_body_length:
  warning: 300
  error: 500
